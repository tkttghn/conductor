# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command and `artifact-name` to assign a name to
# distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#     artifact-name: corne_left_with_logging
#
---
include:
  # Naming: <target>_conductor_v<version>
  # Debug builds use <target>_debug_conductor_v<version>.
  # Reset builds use reset_conductor_v<version>.
  # Keep the target/purpose first so GitHub and Finder lists are easy to scan.
  # Bump the version number on every release.
  - board: xiao_ble//zmk
    shield: monokey_R rgbled_adapter
    snippet: studio-rpc-usb-uart
    artifact-name: R_conductor_v0.5.6-noretro-resumefix
  - board: xiao_ble//zmk
    shield: monokey_L rgbled_adapter
    artifact-name: L_conductor_v0.5.6-noretro-resumefix
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: reset_conductor_v0.5.6-noretro-resumefix
  - board: xiao_ble//zmk
    shield: monokey_R rgbled_adapter
    snippet: studio-rpc-usb-uart zmk-usb-logging
    artifact-name: R_debug_conductor_v0.5.6-noretro-resumefix
