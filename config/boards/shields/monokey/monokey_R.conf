CONFIG_ZMK_KEYBOARD_NAME="conductor"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
# NFC pins as GPIO is now configured in DTS (uicr node)
CONFIG_ZMK_BLE=y

# SPI is auto-selected by PMW3610_ALT driver
CONFIG_INPUT=y

# PMW3610 (badjeff driver - pixart,pmw3610-alt)
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y
CONFIG_PMW3610_ALT_INVERT_X=y
# RUN downshift: maximum time before entering REST1 (max 3264ms)
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
# REST1: faster sampling for quicker wake from idle
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=10
# REST1 downshift: 30 seconds before entering REST2
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=30000
# REST2: moderate sampling, 60 seconds before deep sleep
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=50
CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=60000
# REST3: slowest sampling (save battery in deep idle)
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=200
# Match BLE connection interval (7.5ms) for smooth trackball over Bluetooth
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=7

# BLE keepalive: send zero-motion reports every 2s while idle to prevent
# the host from widening the connection interval (fixes ~3s wake lag on macOS)
CONFIG_ZMK_POINTING_BLE_KEEPALIVE=y

# Sleep timing: IDLE 5min, deep sleep 30min
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_TRANSPORT_BLE=y
CONFIG_ZMK_STUDIO_FIRMWARE_VERSION="0.4.2 beta"

# Allow simultaneous BLE connections: split peripheral + PC + Studio
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=7

# Extended Advertising: keep advertising even while connected to a host.
# Allows Chrome (Conductor Studio) to discover the keyboard on BT1 without
# needing to switch to a pairing profile. Negligible battery impact (~5-10μA).
CONFIG_BT_EXT_ADV=y

#batterycheck
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

#BATTERYLED
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=10
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=5
CONFIG_RGBLED_WIDGET_BATTERY_BLINK_MS=4000
CONFIG_RGBLED_WIDGET_CONN_BLINK_MS=800

#LAYERLED
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=0

#CHARGELED
# 充電中にバッテリー残量に応じた色でLED点灯 (rgbled_widgetと共存)
CONFIG_CHARGE_INDICATOR=y
CONFIG_CHG_POLICY=n
CONFIG_CHG_BATTERY_LEVEL_BASED_COLOR=y
CONFIG_CHG_BATTERY_LEVEL_HIGH=50
CONFIG_CHG_BATTERY_LEVEL_LOW=10
CONFIG_CHG_BATTERY_COLOR_HIGH=2
CONFIG_CHG_BATTERY_COLOR_MEDIUM=3
CONFIG_CHG_BATTERY_COLOR_LOW=1
CONFIG_CHG_BATTERY_COLOR_MISSING=0

# BLE connection parameters — optimized for low latency + fast wake
# Connection interval: 7.5ms fixed (MIN=MAX=6 × 1.25ms)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
# Slave latency 0: respond every interval (no skipping)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# Supervision timeout: 2s (shorter = faster reconnect after idle)
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=200

# Windowsとの接続安定性を高める
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Increase BLE TX buffer for back-to-back HID reports (trackball + keys)
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_CONN_TX_MAX=10
# RX event buffer must be >= TX buffer
CONFIG_BT_BUF_EVT_RX_COUNT=16


# Request connection parameter update more aggressively after reconnect
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# Increase RX buffer for combo RPC (addCombo needs ~37 bytes, default is 30)
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=128
# Increase RPC thread stack size to prevent stack overflow during set_layer_binding.
# zmk_studio_Response is ~1044 bytes; nested send_response calls (notification +
# response) inside set_layer_binding require ~3800 bytes total. 8192 is safe.
CONFIG_ZMK_STUDIO_RPC_THREAD_STACK_SIZE=8192
