CONFIG_ZMK_KEYBOARD_NAME="conductor"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

# Per-profile keymap overlay: each output endpoint (USB / BLE profile) can be
# assigned an overlay keymap layer that auto-activates on top of the shared
# keymap when that endpoint is selected (managed in conductor_os.c).
CONFIG_CONDUCTOR_OS_PROFILE=y
# Runtime-toggleable over the Studio RPC. Default ON, but with the overlay map
# all-zero (the default) this has no effect on the keymap until layers are
# assigned from the Companion.
CONFIG_CONDUCTOR_OS_PROFILE_DEFAULT_ON=y

# High-resolution (smooth) scrolling: adds the HID Resolution Multiplier so
# hosts that support it (Windows/Linux, likely Android) interpret the wheel
# at sub-notch resolution for smoother scrolling. macOS/iPadOS largely ignore
# it (no regression expected — host just treats it as a normal wheel).
# NOTE: changes the mouse HID descriptor -> hosts may need re-pairing. Verify
# scroll amount per-OS; tune zip_scroll_scaler in the overlay if it shifts.
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
# NFC pins as GPIO is now configured in DTS (uicr node)
CONFIG_ZMK_BLE=y

# SPI is auto-selected by PMW3610_ALT driver
CONFIG_INPUT=y

# Input dispatcher thread stack: 1024 (Zephyr default) -> 4096.
# CONFIRMED stack overflow (fatal reason=2, thread=input, captured live
# 2026-06-10): this thread runs the whole trackball pipeline — input
# listener -> processors (scale/AML) -> HID -> BLE notify — and the BLE
# send path deepens under multi-host load. Root cause of the ~30min
# multi-host reboots (v0.5.4..v0.5.6 era).
CONFIG_INPUT_THREAD_STACK_SIZE=4096

# PMW3610 (badjeff driver - pixart,pmw3610-alt)
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y
CONFIG_PMW3610_ALT_INVERT_X=y
# RUN downshift: maximum time before entering REST1 (max 3264ms)
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
# REST1: faster sampling for quicker wake from idle
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=10
# REST1 downshift: 30 seconds before entering REST2
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=30000
# REST2: moderate sampling, 60 seconds before deep sleep
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=50
CONFIG_PMW3610_ALT_REST2_DOWNSHIFT_TIME_MS=60000
# REST3: slowest sampling (save battery in deep idle)
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=200
# Sensor report interval floor (ms). Chosen when the BLE interval was 7.5ms;
# the active link is 15ms fixed since v0.5.3, so up to two reports coalesce per
# conn event. Kept at 7 for motion resolution — raise only with an A/B soak
# (cursor smoothness is the top priority).
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=7

# BLE keepalive: send zero-motion reports while idle to prevent the host
# from widening the connection interval (fixes ~3s wake lag on macOS).
#
# Tuned to 10s interval / 12s max-idle. Prior 2s/60s default caused a
# 30min~1h hang: macOS BT stack accumulated zero-motion HID reports
# (~1800/h) and wedged. At 10s interval the rate is ~360/h — safe.
# 60s max-idle also caused 30min~1h freeze (v0.4.16-rc): even at 10s
# interval, extended keepalive likely blocked the system workqueue via
# bt_le_adv_start() HCI contention. Reverted to 12s.
# Verified 2026-04-28 ~ 2026-04-30 hands-on with 10s interval: no hang.
CONFIG_ZMK_POINTING_BLE_KEEPALIVE=y
CONFIG_ZMK_POINTING_BLE_KEEPALIVE_INTERVAL_MS=10000
CONFIG_ZMK_POINTING_BLE_KEEPALIVE_MAX_IDLE_MS=12000

# Hardware watchdog: auto-reset on system workqueue hang.
# Feed runs on the system workqueue; if a deadlock blocks it,
# feed stops → WDT resets MCU → keyboard reconnects in ~3s.
# v0.5.6: timeout 10s → 30s. With BLE maintenance moved off the system
# workqueue (ZMK fork), anything left that briefly blocks it (Zephyr host
# internals, settings writes) tends to recover within seconds; a 10s
# timeout converted those transient stalls into user-visible reboots.
# 30s still rescues genuine permanent hangs.
CONFIG_ZMK_WATCHDOG=y
CONFIG_ZMK_WATCHDOG_TIMEOUT_MS=30000

# Reset-reason diagnostics (multi-host reboot investigation): on boot blink
# the previous reboot cause — yellow=fatal(assert), red=watchdog,
# magenta=lockup, cyan=other soft reset. Remove after the investigation.
CONFIG_RGBLED_WIDGET_RESET_DIAG=y

# Debug-build log processing thread overflowed its default 768B stack when
# the gesture combo flooded DBG logs (captured: fatal reason=2, garbage esf).
# Harmless for the release build (logging is off there).
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=1536

# Thread names for the reset diagnostics: lets the fatal handler record
# WHICH thread died (decisive for stack overflows where the esf is garbage).
CONFIG_THREAD_NAME=y

# Stack usage accounting for the reset diagnostics: the fatal handler
# records the current thread's unused stack headroom, separating "this
# thread's stack truly overflowed" (~0) from "victim of a foreign/ISR
# stack fault" (large).
CONFIG_INIT_STACKS=y
CONFIG_THREAD_STACK_INFO=y

# Sleep timing: IDLE 5min (OLED off etc.)
# Deep sleep disabled — wake-up from sys_poweroff is unreliable with our
# combined stack (force-awake PMW3610 + BLE keepalive + Studio storage)
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=n

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_TRANSPORT_BLE=y
CONFIG_ZMK_STUDIO_FIRMWARE_VERSION="0.6.2"

CONFIG_ZMK_POINTING_SENSOR_CPI_MULTIPLIER_NUM=2
CONFIG_ZMK_POINTING_SENSOR_CPI_MULTIPLIER_DEN=1

# Expose a single USB serial port to Conductor Studio.
# seeed/xiao_ble defaults BOARD_SERIAL_BACKEND_CDC_ACM=y, which stands up a
# console CDC ACM (board_cdc_acm_uart) in addition to the studio-rpc-usb-uart
# snippet's RPC CDC ACM -> two identical "conductor" usbmodem ports in the USB
# picker, only the RPC one usable. Turn the console backend off (it also gates
# CONSOLE/UART_CONSOLE on); paired with disabling board_cdc_acm_uart in
# monokey_R.overlay, only the Studio RPC port enumerates.
# Debug build re-enables the console via CONFIG_ZMK_USB_LOGGING on its own CDC ACM.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n

# Windows BLE compatibility: suppress automatic PHY Update only.
# ZMK fix/allow-disable-auto-phy changes split BLE's default from select to
# imply, so this board-level n is honored instead of being forced back to y.
# Some Windows BLE drivers/stacks fail when the host stack issues an
# automatic LE PHY Update (request to switch from 1M to 2M PHY) right
# after connection — they disconnect mid-pairing. The first attempt at
# v0.4.9 disabled BT_CTLR_PHY_2M entirely (via ZMK_BLE_EXPERIMENTAL_CONN)
# but that caused a hard hang in the Zephyr controller / link-layer
# within minutes on Mac (LED full off, MCU silent halt — likely
# LL_ASSERT). Reverted.
#
# This setting keeps 2M PHY *capability* on the controller (peer-driven
# PHY Update still works), but stops Zephyr host from auto-issuing
# the request. Mac never initiates PHY Update on its own, so the link
# stays at 1M PHY just like v0.4.8 — same code path, no hang risk.
# Windows hosts also won't see a PHY Update from us, so the failing
# Windows code path isn't triggered.
CONFIG_BT_AUTO_PHY_UPDATE=n

# Allow simultaneous BLE connections: split peripheral (1) + 4 hosts + Studio + margin
# 4 Apple devices all aggressively auto-reconnect simultaneously; 5 was exactly the
# limit (1 split + 4 hosts) leaving no room for ZMK Studio or connection transitions.
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Extended Advertising: keep advertising even while connected to a host.
# Allows Chrome (Conductor Studio) to discover the keyboard on BT1 without
# needing to switch to a pairing profile. Negligible battery impact (~5-10μA).
CONFIG_BT_EXT_ADV=y

# Multi-host watchdog-reboot fix, take 2 (v0.5.6).
# v0.5.5 deferred connected()'s advertising restart to the system workqueue —
# but that is the very thread the watchdog is fed from, so the ~30min reboots
# continued (Windows AND macOS, 2+ bonded hosts). v0.5.6 (ZMK fork
# release/conductor-0.5.6) fixes the class, not the call site:
#  1. ALL BLE profile/advertising maintenance (adv updates, profile saves,
#     profile-changed events) now runs on a dedicated 'BLE Profile Mgmt'
#     workqueue, so a blocked HCI command or flash write can no longer starve
#     the watchdog feed.
#  2. auto-select no longer steals the active profile while the active host is
#     connected — the churn engine: every background host idle-drop/reconnect
#     flipped the profile, re-ran advertising, and scheduled a settings flash
#     write (it also made typing focus jump to the last device to reconnect).
# See conductor-v0.5.4-multihost-ble-hang.
#
# The multi-host BT_SEL handoff suite below is PERMANENTLY RETIRED (user decision
# 2026-06-09): it was not the hang cause, but it is BT_SEL polish only and was
# never validated with the adv-defer fix — do not re-enable. The cursor-smoothness
# rebalance is kept (BT_SEL-only async bt_conn_le_param_update(), never from a
# callback).
CONFIG_ZMK_BLE_UPDATE_CONN_PARAMS_ON_PROFILE_SELECT=y

# Relax non-active host profiles on profile select so they consume fewer radio
# events. With two hosts connected, a non-active 15ms/latency0 link was starving
# the active trackball HID link and causing post-switch cursor jitter (confirmed:
# dropping the non-active host made the active cursor smooth). 45-60ms/latency4
# is the conservative first value; switch-in lag stays small (instant ~290ms).
CONFIG_ZMK_BLE_REBALANCE_NON_ACTIVE_CONN_PARAMS=y
CONFIG_ZMK_BLE_NON_ACTIVE_PREF_MIN_INT=36
CONFIG_ZMK_BLE_NON_ACTIVE_PREF_MAX_INT=48
CONFIG_ZMK_BLE_NON_ACTIVE_PREF_LATENCY=4
CONFIG_ZMK_BLE_NON_ACTIVE_PREF_TIMEOUT=400

# Split central connection interval: 6 (7.5ms) -> 12 (15ms).
# The split-central link to the L peripheral was the dominant radio prepare
# source in the prepare-pipeline-overflow crash (param flood, see
# conductor-ble-prepare-pipeline-overflow). Halving its event rate relieves
# pipeline pressure; only L-half key latency rises (<=7.5ms) — the trackball
# is on R (central) and is unaffected.
CONFIG_ZMK_SPLIT_BLE_PREF_INT=12

# Permanently retired (see above; user decision 2026-06-09). Kept for reference.
# CONFIG_ZMK_BLE_REJECT_NON_ACTIVE_ON_PROFILE_SELECT=y
# CONFIG_ZMK_BLE_RESTART_ADV_DURING_PROFILE_HANDOFF=y
# CONFIG_ZMK_BLE_SAVE_ACTIVE_PROFILE_ON_CONNECT=y
# CONFIG_ZMK_BLE_SAVE_ACTIVE_PROFILE_ON_CONNECT_DELAY_MS=0
# CONFIG_ZMK_BLE_STARTUP_PROFILE_PRIORITY=y
# CONFIG_ZMK_BLE_STARTUP_PROFILE_PRIORITY_TIMEOUT_MS=5000

#batterycheck
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

#BATTERYLED
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=10
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=5
CONFIG_RGBLED_WIDGET_BATTERY_BLINK_MS=4000
CONFIG_RGBLED_WIDGET_CONN_BLINK_MS=800

#LAYERLED
CONFIG_RGBLED_WIDGET=y

# Layer colors are moved to L (peripheral) in phase 2; R now shows the BLE
# profile color instead. Values preserved (commented) for the phase-2 migration
# into monokey_L.conf.
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=n
#CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
#CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=4
#CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
#CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
#CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=5
#CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=5
#CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=1
#CONFIG_RGBLED_WIDGET_LAYER_7_COLOR=7
#CONFIG_RGBLED_WIDGET_LAYER_8_COLOR=7
#CONFIG_RGBLED_WIDGET_LAYER_9_COLOR=7
#CONFIG_RGBLED_WIDGET_LAYER_10_COLOR=7
#CONFIG_RGBLED_WIDGET_LAYER_11_COLOR=7
#CONFIG_RGBLED_WIDGET_LAYER_12_COLOR=6
#CONFIG_RGBLED_WIDGET_LAYER_13_COLOR=6

#PROFILELED — solid color per active BLE profile (BT_SEL 0-5)
# color index: 0=off 1=red 2=green 3=yellow 4=blue 5=magenta 6=cyan 7=white
# P0=white P1=blue P2=green P3=magenta P4=cyan P5=yellow
# 6 profiles: BT_MAX_PAIRED(7) - split peripherals(1) = ZMK_BLE_PROFILE_COUNT 6
CONFIG_RGBLED_WIDGET_SHOW_PROFILE_COLORS=y
CONFIG_RGBLED_WIDGET_PROFILE_0_COLOR=7
CONFIG_RGBLED_WIDGET_PROFILE_1_COLOR=4
CONFIG_RGBLED_WIDGET_PROFILE_2_COLOR=2
CONFIG_RGBLED_WIDGET_PROFILE_3_COLOR=5
CONFIG_RGBLED_WIDGET_PROFILE_4_COLOR=6
CONFIG_RGBLED_WIDGET_PROFILE_5_COLOR=3

# Send the active layer index to the L peripheral over split BLE so its LED
# can show layer color (R shows profile color, L shows layer color).
CONFIG_ZMK_SPLIT_PERIPHERAL_LAYER_STATE=y

#CHARGELED
# Charging: solid orange (yellow=R+G, leans orange on common-anode RGB).
# Full charge: STAT pin goes high -> LED off automatically.
# Low battery (<=10%, not charging): solid red, suppresses widget output.
# Critical (<=5%, not charging): blinking red @ 1Hz (500ms on / 500ms off).
CONFIG_CHARGE_INDICATOR=y
CONFIG_CHG_POLICY=n
CONFIG_CHG_BATTERY_LEVEL_BASED_COLOR=n
CONFIG_CHG_COLOR=3
CONFIG_CHG_LOW_BATTERY_INDICATOR=y
CONFIG_CHG_LOW_BATTERY_THRESHOLD=10
CONFIG_CHG_LOW_BATTERY_COLOR=1
CONFIG_CHG_CRITICAL_BATTERY_THRESHOLD=5
CONFIG_CHG_CRITICAL_BATTERY_COLOR=1
CONFIG_CHG_CRITICAL_BLINK_HALF_PERIOD_MS=500

# TX power max (+8 dBm) — extends robust split BLE range and reduces
# packet loss when L and R halves are 20cm+ apart. nRF52840 supports
# up to +8 dBm, default is 0 dBm; +8 dBm increases link budget by ~8dB
# (~2.5x effective distance), well within FCC/CE limits at 2.4 GHz.
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# BLE connection parameters — Apple-friendly 15ms fixed interval.
# The previous 7.5ms fixed interval improved pointer smoothness, but macOS
# sleep/wake reconnects are more reliable with an Apple-guideline interval.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
# Slave latency 0: respond every interval (no skipping)
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
# Supervision timeout: 4s — tolerates macOS widening the connection interval
# during idle without false-disconnecting. 2s was too aggressive: when macOS
# widens to ~500ms intervals, only 4 missed events trigger a disconnect.
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Increase BLE TX buffer for back-to-back HID reports (trackball + keys)
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_CONN_TX_MAX=10
# RX event buffer must be >= TX buffer
CONFIG_BT_BUF_EVT_RX_COUNT=16


# Request connection parameter update more aggressively after reconnect
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# Increase RX buffer for combo RPC (addCombo needs ~37 bytes, default is 30)
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=128
# Increase RPC thread stack size to prevent stack overflow during set_layer_binding.
# zmk_studio_Response is ~1044 bytes; nested send_response calls (notification +
# response) inside set_layer_binding require ~3800 bytes total. 8192 is safe.
CONFIG_ZMK_STUDIO_RPC_THREAD_STACK_SIZE=8192
